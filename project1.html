<!DOCTYPE html>
<html>
<head>
<title>AI Smart Surveillance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    color: white;
    background: linear-gradient(135deg, #0f2027, #203a43);
    overflow-x: hidden;
}

/* Animated grid background */
.ai-bg::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveGrid 15s linear infinite;
    z-index: -1;
}

@keyframes moveGrid {
    from { transform: translate(0,0); }
    to { transform: translate(-50px,-50px); }
}

.highlight {
    color: #00f2fe;
}
</style>
</head>

<body class="ai-bg">

<div class="container py-5">
<h1 class="highlight">AI Powered Smart Surveillance & Threat Detection</h1>
<hr>

<p>
AI-based monitoring system that detects suspicious activity
using real-time computer vision and automated threat alerts.
</p>

</ul>

</div>

</body>
</html>
