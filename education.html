<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Education | Sai Charan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43);
    color: white;
    overflow-x: hidden;
}

/* 3D Rotating Graduation Cap */
.cap {
    font-size: 100px;
    text-align: center;
    animation: rotateCap 6s linear infinite;
}

@keyframes rotateCap {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
}

/* Timeline */
.timeline {
    position: relative;
    margin: 50px auto;
    padding: 20px 0;
    width: 80%;
}

.timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    width: 4px;
    height: 100%;
    background: #00f2fe;
    transform: translateX(-50%);
}

.timeline-item {
    padding: 20px;
    width: 50%;
    position: relative;
}

.timeline-item.left { left: 0; }
.timeline-item.right { left: 50%; }

.timeline-item::before {
    content: '';
    position: absolute;
    top: 20px;
    width: 15px;
    height: 15px;
    background: #00f2fe;
    border-radius: 50%;
    right: -8px;
}

.timeline-item.right::before {
    left: -8px;
}

.card {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container text-center mt-5">
<div class="cap">🎓</div>
<h1 class="mt-3">My Education Journey</h1>
</div>

<div class="timeline">

<div class="timeline-item left">
<div class="card">
<h4>Sri Indu College of Engineering</h4>
<p>CSE - AIML | CGPA: 6.33</p>
</div>
</div>

<div class="timeline-item right">
<div class="card">
<h4>Narayana College</h4>
<p>Intermediate | CGPA: 8.4</p>
</div>
</div>

<div class="timeline-item left">
<div class="card">
<h4>The Nalgonda Public School</h4>
<p>SSC | CGPA: 6.7</p>
</div>
</div>

<div class="timeline-item right">
<div class="card">
<h4>Naresh IT</h4>
<p>Full Stack .NET Developer Training</p>
</div>
</div>

</div>

<div class="text-center mb-5">
<a href="index.html" class="btn btn-info">Back to Home</a>
</div>

</body>
</html>
