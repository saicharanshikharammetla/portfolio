<!DOCTYPE html>
<html>
<head>
<title>Auto Camera Focus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    color: white;
    background: linear-gradient(135deg, #0b3d2e, #145a32);
    overflow-x: hidden;
}

/* Pulse animation background */
.medical-bg::before {
    content: "";
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0,255,128,0.3) 0%, transparent 70%);
    animation: pulse 4s infinite;
    top: 30%;
    left: 40%;
    z-index: -1;
}

@keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    50% { transform: scale(1.2); opacity: 0.3; }
    100% { transform: scale(0.8); opacity: 0.6; }
}

.highlight {
    color: #00ff99;
}
</style>
</head>

<body class="medical-bg">

<div class="container py-5">
<h1 class="highlight">Auto Camera Focus for General Ward Patients</h1>
<hr>

<p>
Robotic monitoring system integrating Arduino Mega,
Pan-Tilt mechanism, and OCR-based medical data extraction.
</p>

<h4>Technologies Used:</h4>
<ul>
<li>Arduino Mega</li>
<li>Python</li>
<li>OpenCV</li>
<li>Tesseract OCR</li>
<li>UART Communication</li>
</ul>

<a href="index.html" class="btn btn-success mt-3">Back to Portfolio</a>
</div>

</body>
</html>
